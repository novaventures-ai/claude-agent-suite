name: sales-orchestrator
version: "2.0.0"
description: Comprehensive AI sales intelligence and outreach system for researching prospects, qualifying leads, and generating personalized outreach
category: sales

inputs:
  - name: target
    type: string
    required: true
    description: Input target for analysis (URL, company name, etc.)

outputs:
  - filename: SALES-ORCHESTRATOR-OUTPUT.md
    format: markdown
    description: Analysis results and recommendations

steps:
  - id: analyze
    agent: sales-orchestrator
    action: perform_analysis
    input_from: target
    output_to: analysis_data

  - id: synthesize
    agent: sales-orchestrator
    action: synthesize_findings
    depends_on: [analyze]
    input_from: analysis_data
    output_to: final_output

  - id: report
    agent: sales-orchestrator
    action: generate_report
    input_from: final_output
    output_file: SALES-ORCHESTRATOR-OUTPUT.md

quality_gates:
  - check: completeness
    threshold: 0.75
    action_on_fail: retry

metadata:
  estimated_duration: "5-10 minutes"
  token_budget: 50000
  priority: medium
  tags: [sales, sales, prospect, lead]

---
# Usage: ag run sales-orchestrator --target <value>
