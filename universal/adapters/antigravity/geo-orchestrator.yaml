name: geo-orchestrator
version: "2.0.0"
description: Autonomous search engine optimization and generative engine optimization specialist
category: geo

inputs:
  - name: target
    type: string
    required: true
    description: Input target for analysis (URL, company name, etc.)

outputs:
  - filename: GEO-ORCHESTRATOR-OUTPUT.md
    format: markdown
    description: Analysis results and recommendations

steps:
  - id: analyze
    agent: geo-orchestrator
    action: perform_analysis
    input_from: target
    output_to: analysis_data

  - id: synthesize
    agent: geo-orchestrator
    action: synthesize_findings
    depends_on: [analyze]
    input_from: analysis_data
    output_to: final_output

  - id: report
    agent: geo-orchestrator
    action: generate_report
    input_from: final_output
    output_file: GEO-ORCHESTRATOR-OUTPUT.md

quality_gates:
  - check: completeness
    threshold: 0.75
    action_on_fail: retry

metadata:
  estimated_duration: "5-10 minutes"
  token_budget: 50000
  priority: medium
  tags: [geo, geo, seo, search]

---
# Usage: ag run geo-orchestrator --target <value>
